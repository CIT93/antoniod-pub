<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="main.js"></script>
    <title>Week 6 - Cardon Footprint pub </title>
    <style>
        html {
            font-size: 22px;
        }

        body {
            background-color: #333;
            color: whitesmoke;
        }
        input:in-range {
            background-color: lightgreen;
        }
        input:out-of-range {
            background-color: lightcoral;
        }
    </style>
</head>

<body>
    <form id="form">
        <fieldset>
            <legend>Calculating your Carbon Footprint Points</legend>
            <div>
                <label>First Name:</label>
                <input type="text" name="firstname" minlength="1" maxlength="" required
                >
            </div>
            <div>
                <label>Last Name:</label>
                <input type="text" name="lastname" minlength="1" maxlength="20" required>
            </div>
            <div>
                <label>Count the members of your household:</label>
                <input type="number" name="housemembers" min="1" max="6" required>
            </div> 
            <div>
                <label>Consider the size of your home:</label>
                <!-- <input type="text" name="homesize" required> -->
                <select name="houses" required>
                    <option value="">---Please enter size of home---</option>
                    <option value="apt">Apartment</option>
                    <option value="small">Small House</option>
                    <option value="medium">Medium House</option>
                    <option value="large">Large House</option>



                </select>
            </div> 
            <button type="submit">Submit</button>
        </fieldset>
       
    </form>
    <div id="output">

    </div>

</body>

</html>
