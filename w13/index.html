<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Challenge Wk 12</title>
    <script type="module" defer src="main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="form">
        <fieldset id="fieldset">
            <legend>Workout</legend>
            <div>
                <label>What workout will you do?:</label>
                <select name="exerciseType" required>
                    <option value="">---choose a workout---</option>
                    <option value="Pullups">Pull ups</option>
                    <option value="Curls">Curls</option>
                    <option value="Squats">Squats</option>
                    <option value="Run">Run</option>
                </select>
            </div>
            <div>
                <label>How many Reps:</label>
                <input type="number" name="Repsnumber" id="number" required>
            </div>
            <div>
                <label>Time:</label>
                <input type="number" name="Time" id="time" required>
            </div>
            <button type="submit">Submit</button>
        </fieldset>
    </form>
    <div id="output"><div>
    <h1>Submit to start!</h1>
</body>
</html>
